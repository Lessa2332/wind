<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Веселий календар погоди для дослідників</title>
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4fc3f7;
            --secondary: #ffd600;
            --accent: #ff7043;
            --success: #4caf50;
            --bg-light: #e3f2fd;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Bubblegum Sans', cursive;
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #1a237e;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .month-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            margin-bottom: 30px;
        }

        .month-btn {
            background: var(--primary);
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .month-btn:hover {
            transform: scale(1.1);
        }

        .current-month {
            font-size: 28px;
            color: #1a237e;
            font-weight: bold;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 40px;
        }

        .calendar-day {
            aspect-ratio: 1;
            background: white;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border: 3px solid transparent;
            min-height: 80px;
        }

        .calendar-day:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .calendar-day.past {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
        }

        .calendar-day.today {
            background: linear-gradient(135deg, #fff3e0, #ffcc80);
            border-color: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .calendar-day.future {
            background: #f5f5f5;
            opacity: 0.6;
            cursor: not-allowed;
        }

        .calendar-day.recorded {
            border-color: var(--success);
        }

        .day-number {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .weather-icon {
            font-size: 28px;
            margin-top: 5px;
        }

        .recorded-dot {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 12px;
            height: 12px;
            background: var(--success);
            border-radius: 50%;
            border: 2px solid white;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 18px;
        }

        .temp-input {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            border: 3px solid var(--primary);
            border-radius: 15px;
            font-family: inherit;
        }

        .emoji-picker {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }

        .emoji-option {
            font-size: 40px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 3px solid transparent;
            background: transparent;
        }

        .emoji-option:hover {
            transform: scale(1.2);
            background: #f0f8ff;
        }

        .emoji-option.selected {
            border-color: var(--secondary);
            background: #fffde7;
        }

        .textarea-note {
            width: 100%;
            height: 100px;
            padding: 15px;
            border: 3px solid #81d4fa;
            border-radius: 15px;
            font-family: inherit;
            font-size: 16px;
            resize: vertical;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 15px;
            font-family: inherit;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 5px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .stats-panel {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f8fdff;
            border-radius: 15px;
        }

        .stat-value {
            font-size: 32px;
            color: var(--primary);
            font-weight: bold;
        }

        .export-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 30px;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .calendar-grid {
                grid-template-columns: repeat(7, 1fr);
                gap: 5px;
            }
            
            .day-number {
                font-size: 18px;
            }
            
            .weather-icon {
                font-size: 20px;
            }
            
            .month-selector {
                flex-direction: column;
                gap: 10px;
            }
        }

        /* Achievement badges */
        .badge {
            display: inline-block;
            padding: 5px 15px;
            background: linear-gradient(45deg, gold, #ffeb3b);
            border-radius: 20px;
            margin: 5px;
            font-size: 14px;
            animation: glitter 2s infinite;
            border: 2px solid #ff9800;
        }

        @keyframes glitter {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        /* Weekday headers */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
            color: #666;
        }

        .weekday {
            padding: 10px;
            background: rgba(255,255,255,0.8);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌈 Веселий календар погоди 🌈</h1>
            <p style="font-size: 20px; color: #555;">Ти - маленький метеоролог! Записуй погоду кожного дня!</p>
        </div>

        <div class="month-selector">
            <button class="month-btn" onclick="changeMonth(-1)">←</button>
            <div class="current-month" id="currentMonth">Січень 2026</div>
            <button class="month-btn" onclick="changeMonth(1)">→</button>
        </div>

        <div class="weekdays">
            <div class="weekday">Пн</div>
            <div class="weekday">Вт</div>
            <div class="weekday">Ср</div>
            <div class="weekday">Чт</div>
            <div class="weekday">Пт</div>
            <div class="weekday">Сб</div>
            <div class="weekday">Нд</div>
        </div>

        <div class="calendar-grid" id="calendar"></div>

        <div class="stats-panel">
            <h2>📊 Моя статистика</h2>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="daysRecorded">0</div>
                    <div>Днів записано</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="avgTemp">--°C</div>
                    <div>Середня температура</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="sunnyDays">0</div>
                    <div>Сонячних днів</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="currentStreak">0</div>
                    <div>Днів поспіль</div>
                </div>
            </div>
            <div id="achievements" style="margin-top: 20px;"></div>
        </div>

        <div class="export-buttons">
            <button class="btn btn-primary" onclick="exportData()">💾 Зберегти дані</button>
            <button class="btn btn-primary" onclick="printReport()">🖨️ Друк звіту</button>
            <button class="btn btn-primary" onclick="shareData()">📤 Поділитися</button>
            <button class="btn btn-secondary" onclick="clearAllData()">🗑️ Очистити все</button>
        </div>
    </div>

    <!-- Modal for weather input -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle">Запис погоди</h2>
                <button onclick="closeModal()" style="position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 24px; cursor: pointer;">×</button>
            </div>
            
            <div class="input-group">
                <label>🌡️ Температура (°C):</label>
                <input type="number" id="inputTemp" class="temp-input" step="0.1" placeholder="Наприклад: 5.5" min="-50" max="50">
            </div>

            <div class="input-group">
                <label>☁️ Яка погода?</label>
                <div class="emoji-picker" id="weatherPicker">
                    <div class="emoji-option" data-value="☀️" title="Сонячно">☀️</div>
                    <div class="emoji-option" data-value="🌤️" title="Мінлива хмарність">🌤️</div>
                    <div class="emoji-option" data-value="☁️" title="Хмарно">☁️</div>
                    <div class="emoji-option" data-value="🌧️" title="Дощ">🌧️</div>
                    <div class="emoji-option" data-value="❄️" title="Сніг">❄️</div>
                    <div class="emoji-option" data-value="⛈️" title="Гроза">⛈️</div>
                    <div class="emoji-option" data-value="🌪️" title="Вітер">🌪️</div>
                    <div class="emoji-option" data-value="🌈" title="Райдуга">🌈</div>
                </div>
            </div>

            <div class="input-group">
                <label>😊 Який твій настрій сьогодні?</label>
                <div class="emoji-picker" id="moodPicker">
                    <div class="emoji-option" data-value="😀" title="Щасливий">😀</div>
                    <div class="emoji-option" data-value="😊" title="Задоволений">😊</div>
                    <div class="emoji-option" data-value="😐" title="Нейтральний">😐</div>
                    <div class="emoji-option" data-value="😢" title="Сумний">😢</div>
                    <div class="emoji-option" data-value="🤩" title="Радісний">🤩</div>
                    <div class="emoji-option" data-value="🥱" title="Втомлений">🥱</div>
                </div>
            </div>

            <div class="input-group">
                <label>📝 Мої спостереження:</label>
                <textarea id="inputNotes" class="textarea-note" 
                          placeholder="Що цікавого ти помітив сьогодні? Які пташки прилітали? Як змінилася природа?"></textarea>
            </div>

            <div style="text-align: center; margin-top: 25px;">
                <button class="btn btn-primary" onclick="saveWeatherData()">💾 Зберегти запис</button>
                <button class="btn btn-secondary" onclick="closeModal()">Скасувати</button>
                <button class="btn btn-secondary" onclick="deleteDayData()" style="background: #ff5252; color: white;">🗑️ Видалити запис</button>
            </div>
        </div>
    </div>

    <script>
        // Current date management
        let currentDate = new Date();
        let currentYear = currentDate.getFullYear();
        let currentMonth = currentDate.getMonth();
        let selectedDay = null;

        // Days of week in Ukrainian
        const weekDays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Нд'];
        const monthNames = [
            "Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень",
            "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"
        ];
        const monthNamesGenitive = [
            "січня", "лютого", "березня", "квітня", "травня", "червня",
            "липня", "серпня", "вересня", "жовтня", "листопада", "грудня"
        ];

        // Initialize on load
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize emoji pickers
            initEmojiPickers();
            
            // Load initial data
            updateCalendar();
            updateStats();
            checkAchievements();
            
            // Add keyboard support
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeModal();
                }
            });
        });

        function initEmojiPickers() {
            // Add click handlers for emoji pickers
            document.querySelectorAll('.emoji-picker').forEach(picker => {
                picker.addEventListener('click', function(e) {
                    if (e.target.classList.contains('emoji-option')) {
                        const parent = e.target.parentElement;
                        parent.querySelectorAll('.emoji-option').forEach(option => {
                            option.classList.remove('selected');
                        });
                        e.target.classList.add('selected');
                    }
                });
            });
        }

        function updateCalendar() {
            document.getElementById('currentMonth').textContent = 
                `${monthNames[currentMonth]} ${currentYear}`;
            
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';
            
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const today = new Date();
            const isCurrentMonth = today.getMonth() === currentMonth && today.getFullYear() === currentYear;
            
            // Adjust for Ukrainian week (Monday is first day)
            let startOffset = firstDay === 0 ? 6 : firstDay - 1;
            
            // Add empty cells for days before the first day of month
            for (let i = 0; i < startOffset; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.style.visibility = 'hidden';
                calendar.appendChild(emptyCell);
            }
            
            // Add day cells
            for (let day = 1; day <= daysInMonth; day++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'calendar-day';
                
                const cellDate = new Date(currentYear, currentMonth, day);
                const dataKey = `weather_${currentYear}_${currentMonth}_${day}`;
                const savedData = localStorage.getItem(dataKey);
                
                let dayContent = `<div class="day-number">${day}</div>`;
                
                if (savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        dayContent += `<div class="weather-icon">${data.weather}</div>`;
                        dayElement.classList.add('recorded');
                    } catch (e) {
                        console.error('Error parsing saved data:', e);
                    }
                }
                
                dayElement.innerHTML = dayContent;
                
                if (isCurrentMonth && day === today.getDate()) {
                    dayElement.classList.add('today');
                } else if (cellDate < today) {
                    dayElement.classList.add('past');
                } else {
                    dayElement.classList.add('future');
                }
                
                // Only allow clicks on past/today days or if already has data
                if (cellDate <= today || savedData) {
                    dayElement.onclick = () => openWeatherModal(day);
                    dayElement.style.cursor = 'pointer';
                } else {
                    dayElement.style.cursor = 'not-allowed';
                }
                
                calendar.appendChild(dayElement);
            }
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            } else if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            updateCalendar();
            updateStats();
        }

        function openWeatherModal(day) {
            selectedDay = day;
            const modalTitle = document.getElementById('modalTitle');
            modalTitle.textContent = `${day} ${monthNamesGenitive[currentMonth]} ${currentYear}`;
            
            const dataKey = `weather_${currentYear}_${currentMonth}_${day}`;
            const savedData = localStorage.getItem(dataKey);
            
            // Reset all selections first
            document.querySelectorAll('.emoji-option').forEach(option => {
                option.classList.remove('selected');
            });
            
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    document.getElementById('inputTemp').value = data.temp;
                    document.getElementById('inputNotes').value = data.notes || '';
                    
                    // Select saved weather emoji
                    if (data.weather) {
                        const weatherOption = document.querySelector(`#weatherPicker .emoji-option[data-value="${data.weather}"]`);
                        if (weatherOption) {
                            weatherOption.classList.add('selected');
                        }
                    }
                    
                    // Select saved mood emoji
                    if (data.mood) {
                        const moodOption = document.querySelector(`#moodPicker .emoji-option[data-value="${data.mood}"]`);
                        if (moodOption) {
                            moodOption.classList.add('selected');
                        }
                    }
                } catch (e) {
                    console.error('Error parsing saved data:', e);
                    // Clear invalid data
                    localStorage.removeItem(dataKey);
                }
            } else {
                document.getElementById('inputTemp').value = '';
                document.getElementById('inputNotes').value = '';
                
                // Set default selections
                document.querySelector('#weatherPicker .emoji-option[data-value="☀️"]').classList.add('selected');
                document.querySelector('#moodPicker .emoji-option[data-value="😊"]').classList.add('selected');
            }
            
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('inputTemp').focus();
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        function closeModalOnOverlay(event) {
            if (event.target.id === 'modalOverlay') {
                closeModal();
            }
        }

        function saveWeatherData() {
            const tempInput = document.getElementById('inputTemp');
            const temp = tempInput.value.trim();
            
            if (!temp) {
                alert('Будь ласка, вкажи температуру!');
                tempInput.focus();
                return;
            }
            
            const tempNum = parseFloat(temp);
            if (isNaN(tempNum) || tempNum < -50 || tempNum > 50) {
                alert('Температура повинна бути числом між -50°C та 50°C!');
                tempInput.focus();
                return;
            }
            
            const weatherOption = document.querySelector('#weatherPicker .emoji-option.selected');
            const moodOption = document.querySelector('#moodPicker .emoji-option.selected');
            
            if (!weatherOption || !moodOption) {
                alert('Будь ласка, вибери погоду та настрій!');
                return;
            }
            
            const weather = weatherOption.dataset.value;
            const mood = moodOption.dataset.value;
            const notes = document.getElementById('inputNotes').value.trim();
            
            const data = {
                temp: tempNum,
                weather: weather,
                mood: mood,
                notes: notes,
                timestamp: new Date().toISOString(),
                date: `${selectedDay}.${currentMonth + 1}.${currentYear}`
            };
            
            const dataKey = `weather_${currentYear}_${currentMonth}_${selectedDay}`;
            try {
                localStorage.setItem(dataKey, JSON.stringify(data));
                console.log('Data saved:', dataKey, data);
                
                // Update calendar and stats
                updateCalendar();
                updateStats();
                checkAchievements();
                
                // Show success message
                alert(`✅ Дані за ${selectedDay} ${monthNamesGenitive[currentMonth]} успішно збережено!`);
                
                closeModal();
            } catch (e) {
                console.error('Error saving to localStorage:', e);
                alert('Помилка збереження. Перевірте налаштування браузера.');
            }
        }

        function deleteDayData() {
            if (!confirm(`Видалити запис за ${selectedDay} ${monthNamesGenitive[currentMonth]}?`)) {
                return;
            }
            
            const dataKey = `weather_${currentYear}_${currentMonth}_${selectedDay}`;
            localStorage.removeItem(dataKey);
            
            updateCalendar();
            updateStats();
            checkAchievements();
            
            alert(`✅ Запис за ${selectedDay} ${monthNamesGenitive[currentMonth]} видалено!`);
            closeModal();
        }

        function updateStats() {
            let totalTemp = 0;
            let count = 0;
            let sunnyDays = 0;
            let recordedDays = 0;
            let currentStreak = 0;
            let tempStreak = 0;
            let today = new Date();
            
            // Calculate stats for current month
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dataKey = `weather_${currentYear}_${currentMonth}_${day}`;
                const savedData = localStorage.getItem(dataKey);
                
                if (savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        totalTemp += data.temp;
                        count++;
                        recordedDays++;
                        
                        if (data.weather === '☀️') sunnyDays++;
                        
                        // Check streak (only for current month)
                        const date = new Date(currentYear, currentMonth, day);
                        if (date <= today) {
                            tempStreak++;
                            currentStreak = Math.max(currentStreak, tempStreak);
                        } else {
                            tempStreak = 0;
                        }
                    } catch (e) {
                        console.error('Error parsing data for stats:', e);
                    }
                } else {
                    tempStreak = 0;
                }
            }
            
            // Update display
            document.getElementById('daysRecorded').textContent = recordedDays;
            document.getElementById('sunnyDays').textContent = sunnyDays;
            document.getElementById('currentStreak').textContent = currentStreak;
            
            if (count > 0) {
                const avgTemp = totalTemp / count;
                document.getElementById('avgTemp').textContent = `${avgTemp.toFixed(1)}°C`;
            } else {
                document.getElementById('avgTemp').textContent = '--°C';
            }
        }

        function checkAchievements() {
            const achievements = [];
            const weatherKeys = Object.keys(localStorage).filter(key => key.startsWith('weather_'));
            const totalDays = weatherKeys.length;
            
            if (totalDays >= 3) achievements.push('🌱 Новачок метеоролог');
            if (totalDays >= 7) achievements.push('⭐ Початківець спостерігач');
            if (totalDays >= 15) achievements.push('🏆 Досвідчений метеоролог');
            if (totalDays >= 30) achievements.push('👑 Професійний кліматолог');
            
            // Check for specific weather patterns
            let rainyDays = 0;
            let snowyDays = 0;
            let rainbowDays = 0;
            
            weatherKeys.forEach(key => {
                try {
                    const data = JSON.parse(localStorage.getItem(key));
                    if (data.weather === '🌧️') rainyDays++;
                    if (data.weather === '❄️') snowyDays++;
                    if (data.weather === '🌈') rainbowDays++;
                } catch (e) {
                    console.error('Error parsing achievement data:', e);
                }
            });
            
            if (rainyDays >= 3) achievements.push('☔ Дощовий експерт');
            if (snowyDays >= 2) achievements.push('❄️ Зимовий дослідник');
            if (rainbowDays >= 1) achievements.push('🌈 Знайшов скарб');
            
            // Check for consecutive days
            let maxConsecutive = 0;
            let currentConsecutive = 0;
            const sortedKeys = weatherKeys.sort();
            
            // Simple consecutive check (simplified)
            if (weatherKeys.length >= 5) {
                achievements.push('📅 Старанний спостерігач');
            }
            
            // Update achievements display
            const achievementsDiv = document.getElementById('achievements');
            if (achievements.length > 0) {
                achievementsDiv.innerHTML = '<h3>🏆 Мої досягнення:</h3>';
                achievements.forEach(achievement => {
                    achievementsDiv.innerHTML += `<span class="badge">${achievement}</span>`;
                });
            } else {
                achievementsDiv.innerHTML = '<p style="color: #666;">Заповнюй календар щодня, щоб отримати досягнення! ✨</p>';
            }
        }

        function exportData() {
            const allData = {};
            const weatherKeys = Object.keys(localStorage).filter(key => key.startsWith('weather_'));
            
            if (weatherKeys.length === 0) {
                alert('Немає даних для експорту!');
                return;
            }
            
            weatherKeys.sort().forEach(key => {
                try {
                    allData[key] = JSON.parse(localStorage.getItem(key));
                } catch (e) {
                    console.error('Error parsing data for export:', e);
                }
            });
            
            const dataStr = JSON.stringify(allData, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `weather_data_${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert(`✅ Дані успішно експортовано! Завантажено ${weatherKeys.length} записів.`);
        }

        function printReport() {
            const monthNames = [
                "Січень", "Лютий", "Березень", "Квітень", "Травень", "Червень",
                "Липень", "Серпень", "Вересень", "Жовтень", "Листопад", "Грудень"
            ];
            
            let report = `
                <html>
                <head>
                    <title>Звіт про спостереження за погодою</title>
                    <style>
                        body { font-family: Arial, sans-serif; padding: 20px; }
                        h1 { color: #1a237e; }
                        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
                        th { background-color: #f5f5f5; }
                        .header { text-align: center; margin-bottom: 30px; }
                        .stats { background: #f8fdff; padding: 15px; border-radius: 10px; margin: 20px 0; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h1>📋 Звіт про спостереження за погодою</h1>
                        <h2>${monthNames[currentMonth]} ${currentYear}</h2>
                    </div>
            `;
            
            // Add statistics
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            let recordedDays = 0;
            let totalTemp = 0;
            
            report += `<div class="stats"><h3>Статистика:</h3>`;
            
            let tableContent = `
                <table>
                    <tr>
                        <th>Дата</th>
                        <th>Температура</th>
                        <th>Погода</th>
                        <th>Настрій</th>
                        <th>Спостереження</th>
                    </tr>
            `;
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dataKey = `weather_${currentYear}_${currentMonth}_${day}`;
                const savedData = localStorage.getItem(dataKey);
                
                if (savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        recordedDays++;
                        totalTemp += data.temp;
                        
                        tableContent += `
                            <tr>
                                <td>${day}.${currentMonth + 1}.${currentYear}</td>
                                <td>${data.temp}°C</td>
                                <td>${data.weather}</td>
                                <td>${data.mood}</td>
                                <td>${data.notes || ''}</td>
                            </tr>
                        `;
                    } catch (e) {
                        console.error('Error parsing data for print:', e);
                    }
                }
            }
            
            if (recordedDays > 0) {
                const avgTemp = totalTemp / recordedDays;
                report += `<p>Записано днів: ${recordedDays}</p>`;
                report += `<p>Середня температура: ${avgTemp.toFixed(1)}°C</p>`;
            } else {
                report += `<p>Немає записаних даних за цей місяць.</p>`;
            }
            
            report += `</div>`;
            
            if (recordedDays > 0) {
                report += tableContent + `</table>`;
            }
            
            report += `
                    <p style="margin-top: 30px; font-style: italic; color: #666;">
                        Звіт створено за допомогою Веселого календаря погоди 🌈
                    </p>
                </body>
                </html>
            `;
            
            const printWindow = window.open('', '_blank');
            printWindow.document.write(report);
            printWindow.document.close();
            printWindow.focus();
            printWindow.print();
        }

        function shareData() {
            const monthNames = [
                "січня", "лютого", "березня", "квітня", "травня", "червня",
                "липень", "серпень", "вересня", "жовтня", "листопада", "грудня"
            ];
            
            let summary = `Мої спостереження за погодою за ${monthNames[currentMonth]} ${currentYear}:\n\n`;
            
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            let recordedCount = 0;
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dataKey = `weather_${currentYear}_${currentMonth}_${day}`;
                const savedData = localStorage.getItem(dataKey);
                
                if (savedData) {
                    try {
                        const data = JSON.parse(savedData);
                        recordedCount++;
                        summary += `${day}.${currentMonth + 1}: ${data.weather} ${data.temp}°C ${data.mood}\n`;
                    } catch (e) {
                        console.error('Error parsing data for share:', e);
                    }
                }
            }
            
            if (recordedCount === 0) {
                alert('Немає даних для обміну!');
                return;
            }
            
            summary += `\nВсього записано: ${recordedCount} днів`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Мої спостереження за погодою',
                    text: summary,
                    url: window.location.href
                }).catch(err => {
                    console.log('Share cancelled:', err);
                    fallbackShare(summary);
                });
            } else {
                fallbackShare(summary);
            }
        }

        function fallbackShare(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('📋 Дані скопійовано до буферу обміну! Тепер можеш поділитися ними.\n\n' + text.substring(0, 200) + '...');
            }).catch(err => {
                alert('Текст готовий для копіювання:\n\n' + text);
            });
        }

        function clearAllData() {
            if (!confirm('УВАГА! Це видалить ВСІ ваші записи. Продовжити?')) {
                return;
            }
            
            const weatherKeys = Object.keys(localStorage).filter(key => key.startsWith('weather_'));
            weatherKeys.forEach(key => localStorage.removeItem(key));
            
            updateCalendar();
            updateStats();
            checkAchievements();
            
            alert(`✅ Видалено ${weatherKeys.length} записів!`);
        }
    </script>
</body>
